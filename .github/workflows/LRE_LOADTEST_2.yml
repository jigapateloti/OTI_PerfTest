name: LRE Smoke Test

on:
  workflow_dispatch:

jobs:
  run-lre-test:
    runs-on: self-hosted

    env:
      LRE_BASE_URL: ${{ vars.LRE_BASE_URL }}
      LRE_DOMAIN: ${{ vars.LRE_DOMAIN }}
      LRE_PROJECT: ${{ vars.LRE_PROJECT }}
      LRE_TEST_ID: ${{ vars.LRE_TEST_ID }}
      LRE_TEST_INSTANCE_ID: ${{ vars.LRE_TEST_INSTANCE_ID }}
      TENANT_ID: ${{ vars.TENANT_ID }}

      LRE_USERNAME: ${{ secrets.LRE_USERNAME }}
      LRE_PASSWORD: ${{ secrets.LRE_PASSWORD }}

      LRE_TREND_REPORT_ID: 6

      TEAMS_FLOW_WEBHOOK_URL: ${{ secrets.TEAMS_FLOW_WEBHOOK_URL }}

      GH_RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

    steps:
      - name: Run LRE Test
        shell: powershell
        run: |
          # -------------------------------
          # RETRY HELPER
          # -------------------------------
          function Invoke-WithRetry {
              param(
                  [Parameter(Mandatory=$true)] [string]$Uri,
                  [Parameter(Mandatory=$true)] [string]$Method,
                  [Parameter(Mandatory=$false)] $Headers,
                  [Parameter(Mandatory=$false)] $Body,
                  [Parameter(Mandatory=$false)] $WebSession,
                  [int]$MaxRetries = 5,
                  [int]$DelaySeconds = 10
              )

              for ($attempt = 1; $attempt -le $MaxRetries; $attempt++) {
                  try {
                      return Invoke-RestMethod -Uri $Uri -Method $Method -Headers $Headers -Body $Body -WebSession $WebSession -ErrorAction Stop
                  }
                  catch {
                      Write-Host "Attempt $attempt failed: $($_.Exception.Message)"
                      if ($attempt -eq $MaxRetries) {
                          throw "All retry attempts failed for $Uri"
                      }
                      Write-Host "Retrying in $DelaySeconds seconds..."
                      Start-Sleep -Seconds $DelaySeconds
                  }
              }
          }

          Write-Host "Using LRE_BASE_URL = $env:LRE_BASE_URL"
          Write-Host "Authenticating to LRE..."

          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          $headers = @{
            Accept = "application/json"
            "Content-Type" = "application/json"
          }

          # LOGIN
          $loginUrl = "$env:LRE_BASE_URL/LoadTest/rest/authentication-point/AuthenticateClient?tenant=$env:TENANT_ID"
          $loginBody = @{
            ClientIdKey     = $env:LRE_USERNAME
            ClientSecretKey = $env:LRE_PASSWORD
          } | ConvertTo-Json

          $session = New-Object Microsoft.PowerShell.Commands.WebRequestSession
          Invoke-WithRetry -Uri $loginUrl -Method POST -Headers $headers -Body $loginBody -WebSession $session

          # START RUN
          $startUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/Runs"
          $startBody = @{
            PostRunAction   = "Collate And Analyze"
            TestID          = [int]$env:LRE_TEST_ID
            TestInstanceID  = [int]$env:LRE_TEST_INSTANCE_ID
            TimeslotDuration = @{ Hours = 0; Minutes = 30 }
            VudsMode = $false
          } | ConvertTo-Json -Depth 5

          $startResponse = Invoke-WithRetry -Uri $startUrl -Method POST -Headers $headers -Body $startBody -WebSession $session
          $runId = $startResponse.ID

          if (-not $runId) { throw "Run ID missing" }

          # POLL STATUS
          $statusUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/Runs/$runId"

          do {
            Start-Sleep -Seconds 20
            $statusResponse = Invoke-WithRetry -Uri $statusUrl -Method GET -Headers $headers -WebSession $session
            $state = $statusResponse.RunState
          } while ($state -ne "Finished" -and $state -ne "Failed")

          # WAIT FOR REPORT
          Start-Sleep -Seconds 60

          # GET RESULTS
          $resultsUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/Runs/$runId/Results"

          $htmlReportNode = $null
          for ($i = 1; $i -le 10; $i++) {
            $resultsResponse = Invoke-WithRetry -Uri $resultsUrl -Method GET -Headers $headers -WebSession $session
            $htmlReportNode = $resultsResponse | Where-Object { $_.Type -eq "HTML REPORT" }
            if ($htmlReportNode) { break }
            Start-Sleep -Seconds 15
          }

          if (-not $htmlReportNode) { throw "HTML report not found" }

          $resultId = $htmlReportNode.ID
          $reportUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/Runs/$runId/Results/$resultId/data"
          Invoke-WebRequest -Uri $reportUrl -OutFile "LRE-Report.zip" -WebSession $session -UseBasicParsing

          # TREND UPLOAD (CORRECT BASE URL HANDLING)
          $trendUploadUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/TrendReports/$env:LRE_TREND_REPORT_ID/Runs/$runId"
          Write-Host "Uploading to Trend URL: $trendUploadUrl"
          Invoke-WithRetry -Uri $trendUploadUrl -Method POST -Headers $headers -WebSession $session

          # GET ALL TREND RUNS
          $trendRunsUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/TrendReports/$env:LRE_TREND_REPORT_ID/Runs"
          $trendRuns = Invoke-WithRetry -Uri $trendRunsUrl -Method GET -Headers $headers -WebSession $session

          # FIRST RUN LOGIC
          if ($trendRuns.Count -eq 1) {
              Write-Host "Only one run exists. Setting baseline."

              $payload = @{
                runId     = $runId
                status    = $state
                reportUrl = $env:GH_RUN_URL
                message   = "Baseline established. Comparison will begin from next run."
                runDate   = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss")
              }

              Invoke-WithRetry -Uri $env:TEAMS_FLOW_WEBHOOK_URL -Method POST -ContentType "application/json" -Body ($payload | ConvertTo-Json -Depth 5)
              exit 0
          }

          # AUTO-DETECT RUNID FIELD
          $runIdField = ($trendRuns[0].PSObject.Properties |
                         Where-Object { $_.Name -match "RunID|ID|RunId|runId" } |
                         Select-Object -First 1).Name

          # SORT RUNS
          $sortedRuns = $trendRuns | Sort-Object { $_.$runIdField }
          $baselineRun = $sortedRuns[$sortedRuns.Count - 2]
          $currentRun  = $sortedRuns[$sortedRuns.Count - 1]

          # FIND NUMERIC FIELDS
          $numericFields = @()
          foreach ($prop in $trendRuns[0].PSObject.Properties) {
            if ($prop.Value -as [double] -and $prop.Name -ne $runIdField) {
              $numericFields += $prop.Name
            }
          }

          # COMPARE
          $regressionDetected = $false

          foreach ($field in $numericFields) {
            $baselineValue = [double]$baselineRun.$field
            $currentValue  = [double]$currentRun.$field
            if ($baselineValue -eq 0) { continue }
            if ($currentValue -gt ($baselineValue * 1.20)) {
              $regressionDetected = $true
            }
          }

          if ($regressionDetected) { throw "Trend regression detected" }

          # TEAMS NOTIFICATION
          $payload = @{
            runId     = $runId
            status    = $state
            reportUrl = $env:GH_RUN_URL
            message   = "Trend comparison passed. No regression detected."
            runDate   = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss")
          }

          Invoke-WithRetry -Uri $env:TEAMS_FLOW_WEBHOOK_URL -Method POST -ContentType "application/json" -Body ($payload | ConvertTo-Json -Depth 5)

      - name: Upload LRE Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LRE-HTML-Report
          path: LRE-Report.zip
