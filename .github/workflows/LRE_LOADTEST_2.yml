name: Run LRE Test and Generate Trend Report

on:
  workflow_dispatch:
    inputs:
      testId:
        description: "LRE Test ID"
        required: true
      duration:
        description: "Test duration in minutes"
        required: true
      sendTeams:
        description: "Send Teams Notification"
        type: boolean
        default: true

jobs:
  run-lre:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run LRE Test
      shell: pwsh
      env:
        LRE_BASE_URL: ${{ vars.LRE_BASE_URL }}
        LRE_DOMAIN: ${{ vars.LRE_DOMAIN }}
        LRE_PROJECT: ${{ vars.LRE_PROJECT }}
        LRE_USERNAME: ${{ secrets.LRE_USERNAME }}
        LRE_PASSWORD: ${{ secrets.LRE_PASSWORD }}
      run: |
        $session = New-Object Microsoft.PowerShell.Commands.WebRequestSession

        # LOGIN (unchanged)
        $loginBody = @{
          username = $env:LRE_USERNAME
          password = $env:LRE_PASSWORD
        }
        Invoke-WebRequest -Uri "$env:LRE_BASE_URL/Loadtest/pcx/login" `
                          -Method POST -Body $loginBody `
                          -WebSession $session

        # START TEST (unchanged)
        $startBody = @{
          TestID = ${{ github.event.inputs.testId }}
          PostRunAction = "DoNotCollate"
          TimeslotDuration = ${{ github.event.inputs.duration }}
        } | ConvertTo-Json

        $start = Invoke-RestMethod -Uri "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/runs" `
                                   -Method POST -Body $startBody `
                                   -ContentType "application/json" `
                                   -WebSession $session

        $runId = $start.ID
        Write-Host "Run ID: $runId"

        # POLLING (unchanged)
        do {
          Start-Sleep -Seconds 20
          $status = Invoke-RestMethod -Uri "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/runs/$runId" `
                                      -Method GET -WebSession $session
          Write-Host "Status: $($status.RunState)"
        } while ($status.RunState -ne "Finished")

        # DOWNLOAD HTML REPORT (unchanged)
        Invoke-WebRequest -Uri "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/runs/$runId/Reports/HTML" `
                          -OutFile "RunReport.html" `
                          -WebSession $session

        #####################################################################
        # TREND LOGIC STARTS HERE (everything above remains unchanged)
        #####################################################################

        # Create Trend Report
        $timestamp = (Get-Date).ToString("yyyy-MM-dd_HH-mm-ss")
        $trendName = "CICD_DEMO_Run_${runId}_$timestamp"

        $createTrendBody = @{
          Name = $trendName
          Description = "Auto-created by GitHub Actions"
        } | ConvertTo-Json

        $trend = Invoke-RestMethod -Uri "$env:LRE_BASE_URL/loadtest/rest-pcweb/Trend/CreateTrendReport" `
                                   -Method POST -Body $createTrendBody `
                                   -ContentType "application/json" `
                                   -WebSession $session

        $trendId = $trend.TrendReportId
        Write-Host "Trend Report ID: $trendId"

        # Get all runs and select last 2
        $allRuns = Invoke-RestMethod -Uri "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/runs" `
                                     -Method GET -WebSession $session

        $lastTwo = $allRuns | Sort-Object ID -Descending | Select-Object -First 2
        $runIds = $lastTwo.ID

        # Assign runs to Trend Report
        $assignBody = @{
          TrendReportId = $trendId
          RunIds = $runIds
        } | ConvertTo-Json

        Invoke-RestMethod -Uri "$env:LRE_BASE_URL/loadtest/rest-pcweb/Trend/AssignRunsToTrendReport" `
                          -Method POST -Body $assignBody `
                          -ContentType "application/json" `
                          -WebSession $session

        # Generate Trend PDF (PDF returned directly in POST response)
        Invoke-WebRequest -Uri "$env:LRE_BASE_URL/loadtest/rest-pcweb/Trend/CreateTrendPDFReport" `
                          -Method POST -OutFile "TrendReport.pdf" `
                          -WebSession $session

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: LRE-Reports
        path: |
          RunReport.html
          TrendReport.pdf

    - name: Send Teams Notification
      if: ${{ github.event.inputs.sendTeams == 'true' }}
      shell: pwsh
      env:
        TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
        TREND_UI_BASE: "https://msswa-otilre02.csc.nycnet:444/Loadtest/pcx/app/trend"
      run: |
        $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        $trendUrl = "$env:TREND_UI_BASE/$trendId"

        $payload = @{
          "@type" = "MessageCard"
          "@context" = "http://schema.org/extensions"
          "summary" = "LRE Test Completed"
          "themeColor" = "0078D7"
          "title" = "LRE Test Execution Completed"
          "sections" = @(
            @{
              "facts" = @(
                @{ name = "Run ID"; value = "$runId" }
                @{ name = "Trend Report"; value = "$trendUrl" }
                @{ name = "GitHub Run"; value = "$runUrl" }
              )
            }
          )
        } | ConvertTo-Json -Depth 10

        Invoke-RestMethod -Uri $env:TEAMS_WEBHOOK -Method POST -Body $payload -ContentType "application/json"
