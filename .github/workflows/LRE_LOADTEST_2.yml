name: Run LRE Test and Generate Trend Report

on:
  workflow_dispatch:
    inputs:
      testId:
        description: "LRE Test ID"
        required: true
      duration:
        description: "Test duration in minutes"
        required: true
      sendTeams:
        description: "Send Teams Notification"
        type: boolean
        default: true

jobs:
  run-lre:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run LRE Test
      shell: pwsh
      env:
        LRE_BASE_URL: "https://msswa-otilre02.csc.nycnet:444"
        USERNAME: ${{ secrets.LRE_USERNAME }}
        PASSWORD: ${{ secrets.LRE_PASSWORD }}
      run: |
        $session = New-Object Microsoft.PowerShell.Commands.WebRequestSession

        # Login
        $body = @{ user = $env:USERNAME; password = $env:PASSWORD } | ConvertTo-Json
        Invoke-RestMethod -Uri "$env:LRE_BASE_URL/loadtest/rest/authentication/login" `
                          -Method POST -Body $body -ContentType "application/json" `
                          -WebSession $session

        # Start Test
        $startBody = @{
          "TestID" = ${{ github.event.inputs.testId }}
          "PostRunAction" = "DoNotCollate"
          "TimeslotDuration" = ${{ github.event.inputs.duration }}
        } | ConvertTo-Json

        $start = Invoke-RestMethod -Uri "$env:LRE_BASE_URL/loadtest/rest/domains/DEFAULT/projects/DEFAULT/Timeslots" `
                                   -Method POST -Body $startBody -ContentType "application/json" `
                                   -WebSession $session

        $timeslotId = $start.id
        Write-Host "Timeslot ID: $timeslotId"

        # Wait for completion
        do {
          Start-Sleep -Seconds 20
          $status = Invoke-RestMethod -Uri "$env:LRE_BASE_URL/loadtest/rest/domains/DEFAULT/projects/DEFAULT/Timeslots/$timeslotId" `
                                      -Method GET -WebSession $session
          Write-Host "Status: $($status.Status)"
        } while ($status.Status -ne "Finished")

        # Get Run ID
        $runId = $status.RunID
        Write-Host "Run ID: $runId"

        # Download HTML Report
        Invoke-WebRequest -Uri "$env:LRE_BASE_URL/loadtest/rest/domains/DEFAULT/projects/DEFAULT/Runs/$runId/Reports/HTML" `
                          -OutFile "RunReport.html" -WebSession $session

        # Create Trend Report (dynamic name)
        $timestamp = (Get-Date).ToString("yyyy-MM-dd_HH-mm-ss")
        $trendName = "CICD_DEMO_Run_${runId}_$timestamp"

        $createTrendBody = @{
          "Name" = $trendName
          "Description" = "Auto-created by GitHub Actions"
        } | ConvertTo-Json

        $trend = Invoke-RestMethod -Uri "$env:LRE_BASE_URL/loadtest/rest-pcweb/Trend/CreateTrendReport" `
                                   -Method POST -Body $createTrendBody -ContentType "application/json" `
                                   -WebSession $session

        $trendId = $trend.TrendReportId
        Write-Host "Trend Report ID: $trendId"

        # Get all runs and select last 2
        $allRuns = Invoke-RestMethod -Uri "$env:LRE_BASE_URL/loadtest/rest/domains/DEFAULT/projects/DEFAULT/Runs" `
                                     -Method GET -WebSession $session

        $lastTwo = $allRuns | Sort-Object RunID -Descending | Select-Object -First 2
        $runIds = $lastTwo.RunID

        # Assign runs to Trend Report
        $assignBody = @{
          "TrendReportId" = $trendId
          "RunIds" = $runIds
        } | ConvertTo-Json

        Invoke-RestMethod -Uri "$env:LRE_BASE_URL/loadtest/rest-pcweb/Trend/AssignRunsToTrendReport" `
                          -Method POST -Body $assignBody -ContentType "application/json" `
                          -WebSession $session

        # Generate Trend PDF (PDF returned directly in response)
        Invoke-WebRequest -Uri "$env:LRE_BASE_URL/loadtest/rest-pcweb/Trend/CreateTrendPDFReport" `
                          -Method POST -OutFile "TrendReport.pdf" `
                          -WebSession $session

    - name: Upload Reports
      uses: actions/upload-artifact@v4
      with:
        name: LRE-Reports
        path: |
          RunReport.html
          TrendReport.pdf

    - name: Send Teams Notification
      if: ${{ github.event.inputs.sendTeams == 'true' }}
      shell: pwsh
      env:
        TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
        TREND_UI_BASE: "https://msswa-otilre02.csc.nycnet:444/Loadtest/pcx/app/trend"
      run: |
        $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        $trendUrl = "$env:TREND_UI_BASE/$trendId"

        $payload = @{
          "@type" = "MessageCard"
          "@context" = "http://schema.org/extensions"
          "summary" = "LRE Test Completed"
          "themeColor" = "0078D7"
          "title" = "LRE Test Execution Completed"
          "sections" = @(
            @{
              "facts" = @(
                @{ "name" = "Run ID"; "value" = "$runId" }
                @{ "name" = "Trend Report"; "value" = "$trendUrl" }
                @{ "name" = "GitHub Run"; "value" = "$runUrl" }
              )
            }
          )
        } | ConvertTo-Json -Depth 10

        Invoke-RestMethod -Uri $env:TEAMS_WEBHOOK -Method POST -Body $payload -ContentType "application/json"
