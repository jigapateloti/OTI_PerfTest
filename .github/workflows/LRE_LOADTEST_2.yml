name: LRE Smoke Test

on:
  workflow_dispatch:

jobs:
  run-lre-test:
    runs-on: self-hosted

    env:
      LRE_BASE_URL: ${{ vars.LRE_BASE_URL }}
      LRE_DOMAIN: ${{ vars.LRE_DOMAIN }}
      LRE_PROJECT: ${{ vars.LRE_PROJECT }}
      LRE_TEST_ID: ${{ vars.LRE_TEST_ID }}
      LRE_TEST_INSTANCE_ID: ${{ vars.LRE_TEST_INSTANCE_ID }}
      TENANT_ID: ${{ vars.TENANT_ID }}

      LRE_USERNAME: ${{ secrets.LRE_USERNAME }}
      LRE_PASSWORD: ${{ secrets.LRE_PASSWORD }}

      # Trend Report ID (must be set in repo/org variables)
      LRE_TREND_REPORT_ID: ${{ vars.LRE_TREND_REPORT_ID }}

    steps:
      - name: Run LRE Test
        shell: powershell
        run: |
          Write-Host "Authenticating to LRE..."

          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          $headers = @{
            "Accept" = "application/json"
            "Content-Type" = "application/json"
          }

          # -----------------------------
          # LOGIN
          # -----------------------------
          $loginUrl = "$env:LRE_BASE_URL/LoadTest/rest/authentication-point/AuthenticateClient?tenant=$env:TENANT_ID"
          $loginBody = @{
            ClientIdKey     = $env:LRE_USERNAME
            ClientSecretKey = $env:LRE_PASSWORD
          } | ConvertTo-Json
          $session = New-Object Microsoft.PowerShell.Commands.WebRequestSession

          Invoke-RestMethod -Uri $loginUrl -Method POST -Headers $headers -Body $loginBody -WebSession $session -ErrorAction Stop
          Write-Host "Login successful."

          # -----------------------------
          # START TEST RUN
          # -----------------------------
          $startUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/Runs"
          $startBody = @{
            PostRunAction   = "Collate And Analyze"
            TestID          = [int]$env:LRE_TEST_ID
            TestInstanceID  = [int]$env:LRE_TEST_INSTANCE_ID
            TimeslotDuration = @{
              Hours   = 0
              Minutes = 30
            }
            VudsMode = $false
          } | ConvertTo-Json -Depth 5

          $startResponse = Invoke-RestMethod -Uri $startUrl -Method POST -Headers $headers -Body $startBody -WebSession $session -ErrorAction Stop
          $runId = $startResponse.ID
          Write-Host "Run ID: $runId"

          if (-not $runId) { throw "Run ID is empty - LRE did not return valid JSON." }

          # -----------------------------
          # POLL RUN STATUS
          # -----------------------------
          $statusUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/Runs/$runId"

          do {
            Start-Sleep -Seconds 20
            $statusResponse = Invoke-RestMethod -Uri $statusUrl -Method GET -Headers $headers -WebSession $session -ErrorAction Stop
            $state = $statusResponse.RunState
            Write-Host "Current State: $state"
          } while ($state -ne "Finished" -and $state -ne "Failed")

          Write-Host "Run completed with state: $state"

          # -----------------------------
          # WAIT FOR REPORT GENERATION
          # -----------------------------
          Write-Host "Waiting 60 seconds for LRE to generate HTML report..."
          Start-Sleep -Seconds 60

          # -----------------------------
          # GET RESULTS (HTML REPORT)
          # -----------------------------
          $resultsUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/Runs/$runId/Results"

          $maxRetries = 10
          $retryDelay = 15
          $htmlReportNode = $null

          for ($i = 1; $i -le $maxRetries; $i++) {
            $resultsResponse = Invoke-RestMethod -Uri $resultsUrl -Method GET -Headers $headers -WebSession $session -ErrorAction Stop
            $htmlReportNode = $resultsResponse | Where-Object { $_.Type -eq "HTML REPORT" }

            if ($htmlReportNode) { break }

            Write-Host "HTML report not ready. Attempt $i of $maxRetries..."
            Start-Sleep -Seconds $retryDelay
          }

          if (-not $htmlReportNode) { throw "HTML REPORT did not appear after waiting." }

          $resultId = $htmlReportNode.ID
          Write-Host "HTML Report Result ID: $resultId"

          # -----------------------------
          # DOWNLOAD REPORT
          # -----------------------------
          $reportUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/Runs/$runId/Results/$resultId/data"
          Invoke-WebRequest -Uri $reportUrl -OutFile "LRE-Report.zip" -WebSession $session -UseBasicParsing -ErrorAction Stop
          Write-Host "Report downloaded: LRE-Report.zip"

          # -----------------------------
          # TREND REPORT UPLOAD
          # -----------------------------
          if ($env:LRE_TREND_REPORT_ID) {

            Write-Host "Uploading run $runId to Trend Report ID: $env:LRE_TREND_REPORT_ID"

            $trendUploadUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/TrendReports/$env:LRE_TREND_REPORT_ID/Run/$runId"

            Invoke-RestMethod -Uri $trendUploadUrl -Method POST -Headers $headers -WebSession $session -ErrorAction Stop
            Write-Host "Trending upload completed."

            # -----------------------------
            # AUTO-DETECT TREND FIELDS
            # -----------------------------
            Write-Host "Fetching trend runs for auto-detection..."

            $trendRunsUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/TrendReports/$env:LRE_TREND_REPORT_ID/Runs"
            $trendRuns = Invoke-RestMethod -Uri $trendRunsUrl -Method GET -Headers $headers -WebSession $session -ErrorAction Stop

            if ($trendRuns.Count -lt 2) {
                Write-Host "Not enough runs in trend report to compare."
                return
            }

            # Detect Run ID field
            $runIdField = ($trendRuns[0].PSObject.Properties |
                           Where-Object { $_.Name -match "RunID|ID|RunId|runId" } |
                           Select-Object -First 1).Name

            if (-not $runIdField) {
                throw "Unable to detect RunID field in trend report JSON."
            }

            Write-Host "Detected RunID field: $runIdField"

            # Detect numeric KPI fields
            $numericFields = @()

            foreach ($prop in $trendRuns[0].PSObject.Properties) {
                if ($prop.Value -as [double]) {
                    if ($prop.Name -notmatch $runIdField) {
                        $numericFields += $prop.Name
                    }
                }
            }

            if ($numericFields.Count -eq 0) {
                throw "No numeric KPI fields detected in trend report."
            }

            Write-Host "Detected numeric KPI fields:"
            $numericFields | ForEach-Object { Write-Host " - $_" }

            # Sort runs by detected RunID
            $sortedRuns = $trendRuns | Sort-Object { $_.$runIdField }

            $baselineRun = $sortedRuns[$sortedRuns.Count - 2]
            $currentRun  = $sortedRuns[$sortedRuns.Count - 1]

            Write-Host "Baseline Run ID: $($baselineRun.$runIdField)"
            Write-Host "Current  Run ID: $($currentRun.$runIdField)"

            # -----------------------------
            # KPI COMPARISON
            # -----------------------------
            $regressionDetected = $false
            $regressionMessages = @()

            Write-Host "`nComparing KPIs..."

            foreach ($field in $numericFields) {

                $baselineValue = [double]$baselineRun.$field
                $currentValue  = [double]$currentRun.$field

                if ($baselineValue -eq 0) { continue }

                $threshold = $baselineValue * 1.20

                if ($currentValue -gt $threshold) {
                    $regressionDetected = $true
                    $regressionMessages += "❌ $field regressed: baseline=$baselineValue, current=$currentValue"
                }
                else {
                    Write-Host "✔ $field OK: baseline=$baselineValue, current=$currentValue"
                }
            }

            if ($regressionDetected) {
                Write-Host "`nTrend comparison FAILED:"
                $regressionMessages | ForEach-Object { Write-Host $_ }
                throw "One or more KPIs regressed by more than 20%."
            }
            else {
                Write-Host "`nTrend comparison PASSED: No KPI regressions detected."
            }
          }
          else {
            Write-Host "LRE_TREND_REPORT_ID not set. Skipping trending upload + comparison."
          }

          # -----------------------------
          # TEAMS NOTIFICATION
          # -----------------------------
          $teamsWebhookUrl = "${{ secrets.TEAMS_FLOW_WEBHOOK_URL }}"

          $payload = @{
              runId     = $runId
              status    = $state
              reportUrl = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              message   = "HTML report is available in the pipeline artifacts."
              runDate   = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss")
          }

          Invoke-RestMethod -Uri $teamsWebhookUrl -Method POST -ContentType "application/json" -Body ($payload | ConvertTo-Json -Depth 5)

      - name: Upload LRE Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LRE-HTML-Report
          path: LRE-Report.zip
