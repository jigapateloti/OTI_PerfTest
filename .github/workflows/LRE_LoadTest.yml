name: LRE Smoke Test

on:
  workflow_dispatch:

jobs:
  run-lre-test:
    runs-on: self-hosted

    env:
      LRE_BASE_URL: "https://msswa-otilre02.csc.nycnet:444"

      LRE_DOMAIN: ${{ vars.LRE_DOMAIN }}
      LRE_PROJECT: ${{ vars.LRE_PROJECT }}
      LRE_TEST_ID: ${{ vars.LRE_TEST_ID }}
      LRE_TEST_INSTANCE_ID: ${{ vars.LRE_TEST_INSTANCE_ID }}
      TENANT_ID: ${{ vars.TENANT_ID }}

      LRE_USERNAME: ${{ secrets.LRE_USERNAME }}
      LRE_PASSWORD: ${{ secrets.LRE_PASSWORD }}

      TEAMS_FLOW_WEBHOOK_URL: ${{ secrets.TEAMS_FLOW_WEBHOOK_URL }}

      GH_RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

    steps:
      - name: Run LRE Test + Generate Trend Report
        shell: powershell
        run: |
          Write-Host "Using LRE_BASE_URL = $env:LRE_BASE_URL"

          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          $headers = @{
            Accept = "application/json"
            "Content-Type" = "application/json"
          }

          #####################################################################
          # LOGIN
          #####################################################################
          $loginUrl = "$env:LRE_BASE_URL/LoadTest/rest/authentication-point/AuthenticateClient?tenant=$env:TENANT_ID"
          $loginBody = @{
            ClientIdKey     = $env:LRE_USERNAME
            ClientSecretKey = $env:LRE_PASSWORD
          } | ConvertTo-Json

          $session = New-Object Microsoft.PowerShell.Commands.WebRequestSession
          Invoke-RestMethod -Uri $loginUrl -Method POST -Headers $headers -Body $loginBody -WebSession $session

          #####################################################################
          # START RUN
          #####################################################################
          $startUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/Runs"
          $startBody = @{
            PostRunAction   = "Collate And Analyze"
            TestID          = [int]$env:LRE_TEST_ID
            TestInstanceID  = [int]$env:LRE_TEST_INSTANCE_ID
            TimeslotDuration = @{ Hours = 0; Minutes = 30 }
            VudsMode = $false
          } | ConvertTo-Json -Depth 5

          $startResponse = Invoke-RestMethod -Uri $startUrl -Method POST -Headers $headers -Body $startBody -WebSession $session
          $runId = $startResponse.ID
          Write-Host "Run ID: $runId"

          #####################################################################
          # POLL STATUS
          #####################################################################
          $statusUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/Runs/$runId"

          do {
            Start-Sleep -Seconds 20
            $statusResponse = Invoke-RestMethod -Uri $statusUrl -Method GET -Headers $headers -WebSession $session
            $state = $statusResponse.RunState
            Write-Host "Current state: $state"
          } while ($state -ne "Finished" -and $state -ne "Failed")

          #####################################################################
          # NEW TREND REPORT CREATION (NEW TREND API)
          #####################################################################
          $timestamp = (Get-Date).ToString("yyyy-MM-dd_HH-mm-ss")
          $trendName = "CICD_DEMO_Run_${runId}_$timestamp"

          $createTrendBody = @{
              Name        = $trendName
              Description = "Auto-created by GitHub Actions"
          } | ConvertTo-Json

          $trendCreateUrl = "$env:LRE_BASE_URL/loadtest/rest-pcweb/Trend/CreateTrendReport"
          $trendCreateResponse = Invoke-RestMethod -Uri $trendCreateUrl -Method POST -Body $createTrendBody -ContentType "application/json" -WebSession $session

          $trendReportId = $trendCreateResponse.TrendReportId
          Write-Host "Created Trend Report ID: $trendReportId"

          #####################################################################
          # ASSIGN RUN TO TREND REPORT
          #####################################################################
          $assignBody = @{
              TrendReportId = $trendReportId
              RunIds        = @($runId)
          } | ConvertTo-Json

          $assignUrl = "$env:LRE_BASE_URL/loadtest/rest-pcweb/Trend/AssignRunsToTrendReport"
          Invoke-RestMethod -Uri $assignUrl -Method POST -Body $assignBody -ContentType "application/json" -WebSession $session

          #####################################################################
          # GENERATE TREND PDF
          #####################################################################
          $pdfUrl = "$env:LRE_BASE_URL/loadtest/rest-pcweb/Trend/CreateTrendPDFReport"
          Invoke-WebRequest -Uri $pdfUrl -Method POST -OutFile "TrendReport.pdf" -WebSession $session

          #####################################################################
          # SEND TEAMS NOTIFICATION WITH TREND REPORT
          #####################################################################
          $trendUiUrl = "$env:LRE_BASE_URL/Loadtest/pcx/app/trend/$trendReportId"

          $payload = @{
              runId       = $runId
              status      = $state
              trendReport = $trendUiUrl
              message     = "Trend Report generated successfully."
              githubRun   = $env:GH_RUN_URL
          }

          Invoke-RestMethod -Uri $env:TEAMS_FLOW_WEBHOOK_URL -Method POST -ContentType "application/json" -Body ($payload | ConvertTo-Json -Depth 5)

      - name: Upload Trend PDF
        uses: actions/upload-artifact@v4
        with:
          name: LRE-Trend-PDF
          path: TrendReport.pdf
