name: LRE Load Test (1 Hour with Ramp Logic)

on:
  workflow_dispatch:

jobs:
  run-lre-test:
    runs-on: self-hosted

    env:
      LRE_BASE_URL: ${{ vars.LRE_BASE_URL }}
      LRE_DOMAIN: ${{ vars.LRE_DOMAIN }}
      LRE_PROJECT: ${{ vars.LRE_PROJECT }}
      LRE_TEST_ID: ${{ vars.LRE_TEST_ID }}
      LRE_TEST_INSTANCE_ID: ${{ vars.LRE_TEST_INSTANCE_ID }}
      TENANT_ID: ${{ vars.TENANT_ID }}

      LRE_USERNAME: ${{ secrets.LRE_USERNAME }}
      LRE_PASSWORD: ${{ secrets.LRE_PASSWORD }}

    steps:
      - name: Run LRE Load Test
        shell: powershell
        run: |
          Write-Host "Authenticating to LRE..."

          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

          $headers = @{
            "Accept" = "application/json"
            "Content-Type" = "application/json"
          }

          # -----------------------------
          # LOGIN
          # -----------------------------
          $loginUrl = "$env:LRE_BASE_URL/LoadTest/rest/authentication-point/AuthenticateClient?tenant=$env:TENANT_ID"

          $loginBody = @{
            ClientIdKey     = $env:LRE_USERNAME
            ClientSecretKey = $env:LRE_PASSWORD
          } | ConvertTo-Json

          $session = New-Object Microsoft.PowerShell.Commands.WebRequestSession

          Invoke-RestMethod `
            -Uri $loginUrl `
            -Method POST `
            -Headers $headers `
            -Body $loginBody `
            -WebSession $session `
            -ErrorAction Stop

          Write-Host "Login successful."

          # -----------------------------
          # START RUN WITH RAMP LOGIC
          # -----------------------------
          $startUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/Runs"

          # RAMP LOGIC
          # Adjust these values as needed
          $rampUpVusers = 1
          $rampUpEverySeconds = 15

          $steadyStateDurationMinutes = 60

          $rampDownVusers = 1
          $rampDownEverySeconds = 15

          $startBody = @{
            PostRunAction   = "Collate And Analyze"
            TestID          = [int]$env:LRE_TEST_ID
            TestInstanceID  = [int]$env:LRE_TEST_INSTANCE_ID

            TimeslotDuration = @{
              Hours   = 1
              Minutes = 0
            }

            # NEW: Ramp-up and Ramp-down logic
            VusersDistribution = @{
              Groups = @(
                @{
                  GroupName = "ChildCareUserCreation"
                  # INITIALIZE
                  Initialize = @{
                    Vusers = $rampUpVusers
                    Pacing  = "00:00:01"
                  }
                  # RAMP-UP
                  Start = @{
                    Vusers = $rampUpVusers
                    Pacing = ("00:00:{0:D2}" -f $rampUpEverySeconds)
                  }
                  # STEADY STATE
                  Duration = @{
                    Duration = ("00:{0:D2}:00" -f $steadyStateDurationMinutes)
                  }
                  # RAMP-DOWN
                  Stop = @{
                    Vusers = $rampDownVusers
                    Pacing = ("00:00:{0:D2}" -f $rampDownEverySeconds)
                  }
                }
              )
            }

            VudsMode = $false
          } | ConvertTo-Json -Depth 10

          $startResponse = Invoke-RestMethod `
            -Uri $startUrl `
            -Method POST `
            -Headers $headers `
            -Body $startBody `
            -WebSession $session `
            -ErrorAction Stop

          $runId = $startResponse.ID
          Write-Host "Run ID: $runId"

          # -----------------------------
          # POLLING LOOP
          # -----------------------------
          $statusUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/Runs/$runId"

          do {
            Start-Sleep -Seconds 20

            $statusResponse = Invoke-RestMethod `
              -Uri $statusUrl `
              -Method GET `
              -Headers $headers `
              -WebSession $session `
              -ErrorAction Stop

            $state = $statusResponse.RunState
            Write-Host "Current State: $state"

          } while ($state -ne "Finished" -and $state -ne "Failed")

          Write-Host "Run completed with state: $state"

          # -----------------------------
          # COOLING PERIOD
          # -----------------------------
          Write-Host "Waiting 120 seconds for LRE to generate HTML report..."
          Start-Sleep -Seconds 120

          # -----------------------------
          # GET RESULTS
          # -----------------------------
          $resultsUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/Runs/$runId/Results"

          $maxRetries = 15
          $retryDelay = 15
          $htmlReportNode = $null

          for ($i = 1; $i -le $maxRetries; $i++) {

              $resultsResponse = Invoke-RestMethod `
                -Uri $resultsUrl `
                -Method GET `
                -Headers $headers `
                -WebSession $session `
                -ErrorAction Stop

              $htmlReportNode = $resultsResponse | Where-Object { $_.Type -eq "HTML REPORT" }

              if ($htmlReportNode) { break }

              Write-Host "HTML report not ready. Attempt $i of $maxRetries..."
              Start-Sleep -Seconds $retryDelay
          }

          if (-not $htmlReportNode) {
              throw "HTML REPORT did not appear after waiting."
          }

          $resultId = $htmlReportNode.ID

          # -----------------------------
          # DOWNLOAD REPORT
          # -----------------------------
          $reportUrl = "$env:LRE_BASE_URL/LoadTest/rest/domains/$env:LRE_DOMAIN/projects/$env:LRE_PROJECT/Runs/$runId/Results/$resultId/data"

          Invoke-WebRequest `
            -Uri $reportUrl `
            -OutFile "LRE-Report.zip" `
            -WebSession $session `
            -UseBasicParsing `
            -ErrorAction Stop

          Write-Host "Report downloaded: LRE-Report.zip"

      - name: Upload LRE Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LRE-HTML-Report
          path: LRE-Report.zip
