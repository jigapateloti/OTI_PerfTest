- name: Run LRE Test
  shell: powershell
  run: |
    Write-Host "Authenticating to LRE..."

    # -----------------------------
    # 1. AUTHENTICATION
    # -----------------------------
    $baseUrl = "https://mspwva-ditapc14.doitt.nycnet:444/loadtest/rest"
    $loginBody = @{
      Username = "***"
      Password = "***"
    } | ConvertTo-Json

    $loginResponse = Invoke-RestMethod `
      -Uri "$baseUrl/authentication/login" `
      -Method POST `
      -ContentType "application/json" `
      -Body $loginBody `
      -SessionVariable session

    Write-Host "Login successful."

    # -----------------------------
    # 2. START TEST RUN
    # -----------------------------
    $startBody = @{
      TestID  = 1777
      Domain  = "DOB"
      Project = "DOBNOW"
    } | ConvertTo-Json

    $runResponse = Invoke-RestMethod `
      -Uri "$baseUrl/domains/DOB/projects/DOBNOW/runs" `
      -Method POST `
      -ContentType "application/json" `
      -Body $startBody `
      -WebSession $session

    $runId = $runResponse.RunID
    Write-Host "Triggered Test Run ID: $runId"

    # -----------------------------
    # 3. POLLING LOOP
    # -----------------------------
    $state = "Initializing"

    do {
      Start-Sleep -Seconds 20

      $statusResponse = Invoke-RestMethod `
        -Uri "$baseUrl/domains/DOB/projects/DOBNOW/runs/$runId/status" `
        -Method GET `
        -WebSession $session

      $state = $statusResponse.RunState
      Write-Host "Current State: $state"

    } while ($state -ne "Finished" -and $state -ne "Failed")

    Write-Host "Test completed with state: $state"

    # -----------------------------
    # 4. DOWNLOAD REPORT
    # -----------------------------
    $reportUrl = "$baseUrl/domains/DOB/projects/DOBNOW/runs/$runId/Report/html"
    $outputZip = "LRE-Report.zip"

    Invoke-WebRequest `
      -Uri $reportUrl `
      -OutFile $outputZip `
      -WebSession $session

    Write-Host "Report downloaded: $outputZip"
